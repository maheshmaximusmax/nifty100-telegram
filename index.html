<!DOCTYPE html><html>
<head>
  <title>Nifty Dashboard FIXED</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>
<body style="background:#0d1117;color:white;font-family:sans-serif;padding:20px"><h2>📊 Nifty Dashboard (Fixed)</h2><input type="file" id="file" />
<br><br><button onclick="loadCrypto()">Load Live Crypto (Demo)</button>

<canvas id="chart" height="100"></canvas>

<script>
let chart;

document.getElementById("file").addEventListener("change", function(e){
    const file = e.target.files[0];
    if(!file) return;

    Papa.parse(file,{
        header:true,
        skipEmptyLines:true,
        complete:function(results){
            console.log(results.data);

            if(results.data.length === 0){
                alert("CSV not loaded properly");
                return;
            }

            processData(results.data);
        }
    });
});

function processData(data){

    // FIX: flexible column mapping
    const labels = [];
    const values = [];

    data.forEach(row=>{
        let name = row.symbol || row.Symbol || row.name || "NA";
        let price = row.lastPrice || row.close || row.price || 0;

        if(name && price){
            labels.push(name);
            values.push(parseFloat(price));
        }
    });

    drawChart(labels.slice(0,20), values.slice(0,20));
}

function drawChart(labels, data){

    if(chart){
        chart.destroy();
    }

    chart = new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels:labels,
            datasets:[{
                label:"Stock Price",
                data:data
            }]
        }
    });
}

// LIVE CRYPTO DEMO
async function loadCrypto(){
    const res = await fetch("https://api.binance.com/api/v3/ticker/price");
    const data = await res.json();

    const labels = data.slice(0,20).map(x=>x.symbol);
    const values = data.slice(0,20).map(x=>parseFloat(x.price));

    drawChart(labels, values);
}
</script></body>
  </html>
