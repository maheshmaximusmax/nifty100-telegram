name: Nifty 100 Auto Download

on:
  schedule:
    # Default: 9:30 AM IST = 4:00 AM UTC, Mon-Fri
    # IST = UTC + 5:30, so 9:30 AM IST = 04:00 UTC
    - cron: '0 4 * * 1-5'

  # This allows manual trigger from the dashboard (and from applySchedule button)
  workflow_dispatch:
    inputs:
      index_name:
        description: 'NSE Index Name'
        required: false
        default: 'NIFTY 100'
        type: choice
        options:
          - NIFTY 100
          - NIFTY 50
          - NIFTY NEXT 50
          - NIFTY MIDCAP 100
          - NIFTY SMALLCAP 100
          - NIFTY BANK
          - NIFTY IT
          - NIFTY PHARMA
          - NIFTY AUTO
          - NIFTY FMCG
          - NIFTY METAL

  # This keeps the workflow ACTIVE so GitHub does not auto-disable schedule
  # It runs on every push to main — harmless but keeps cron alive
  push:
    branches:
      - main
    paths:
      - '.github/workflows/nifty100.yml'

jobs:
  send-nifty-csv:
    runs-on: ubuntu-latest

    # Only run the actual bot logic on schedule OR manual trigger
    # On push (keep-alive), skip the job silently
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run Nifty Bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_REPO: ${{ github.repository }}
          INDEX_NAME: ${{ github.event.inputs.index_name || 'NIFTY 100' }}
        run: python nifty100_bot.py
