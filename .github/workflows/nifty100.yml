name: Nifty Beast Daily Bot
on:
  schedule:
    - cron: '44 5 * * 1-5'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Trigger reason'
        required: false
        default: 'Manual'
      index_name:
        description: 'Index to download'
        required: false
        default: 'NIFTY 100'
jobs:
  send-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pytz
      - name: Run bot
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          CHAT_ID:    ${{ secrets.CHAT_ID }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          INDEX_NAME: ${{ github.event.inputs.index_name || 'NIFTY 100' }}
        run: python nifty100_bot.py
