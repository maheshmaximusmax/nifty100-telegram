name: Nifty 100 Auto Download

on:
  schedule:
    - cron: '0 9 * * 1-5'  # 9:30 AM IST (adjust if needed)
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests python-telegram-bot pandas
    
    - name: Download CSV
      run: python scripts/download_nifty.py
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        RECIPIENTS: ${{ secrets.RECIPIENTS }}
    
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data/nifty100.csv
        git commit -m "Auto-update CSV $(date)" || echo "No changes"
        git push
