name: Nifty 100 Auto Download

on:
  schedule:
    - cron: '0 4 * * 1-5'  # 9:30 AM IST = 4:00 AM UTC (UTC+5:30 → subtract 5h30m), Mon–Fri
  workflow_dispatch:
    inputs:
      index_name:
        description: 'NSE Index to download'
        required: false
        default: 'NIFTY 100'

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pytz

    - name: Run bot (send CSV to Telegram & upload to GitHub)
      run: python nifty100_bot.py
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
        RECIPIENTS: ${{ secrets.RECIPIENTS }}
        GH_TOKEN: ${{ secrets.GH_TOKEN }}
        GH_REPO: ${{ github.repository }}
        INDEX_NAME: ${{ github.event.inputs.index_name || 'NIFTY 100' }}
