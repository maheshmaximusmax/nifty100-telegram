name: Nifty100 Daily Telegram Bot

on:
  schedule:
    # 9:30 AM IST = 4:00 AM UTC
    - cron: '0 4 * * 1-5'   # Mon–Fri only (market days)
  workflow_dispatch:          # Allows you to run it manually anytime

jobs:
  send-nifty100:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install requests pytz

      - name: Run Nifty100 bot
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python nifty100_bot.py
